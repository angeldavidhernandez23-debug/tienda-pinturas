<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Axalta System</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
  border-bottom:3px solid #c00000;
}

nav button {
  background:none;
  border:none;
  color:white;
  margin:0 10px;
  cursor:pointer;
  font-size:16px;
}

nav button:hover { color:red; }

.container { padding:20px; }

.card {
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  display:none;
}

input, select {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.btn-save { background:red; color:white; }

table {
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

th {
  background:#c00000;
  padding:10px;
}

td {
  padding:8px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<header>
  <h2>Axalta System</h2>
  <nav>
    <button onclick="mostrar('clientes')">Clientes</button>
    <button onclick="mostrar('productos')">Productos</button>
    <button onclick="mostrar('ventas')">Ventas</button>
  </nav>
</header>

<div class="container">

<!-- ================= CLIENTES CRUD ================= -->
<div id="clientes" class="card">
<h2>Clientes</h2>

<input id="nombreC" placeholder="Nombre">
<input id="telefonoC" placeholder="Teléfono">
<input id="direccionC" placeholder="Dirección">

<button onclick="guardarCliente()" class="btn-save">Guardar</button>
<button onclick="limpiarCliente()">Limpiar</button>

<table id="tablaClientes"></table>
</div>

<!-- ================= PRODUCTOS CRUD ================= -->
<div id="productos" class="card">
<h2>Productos</h2>

<input id="nombreP" placeholder="Nombre">
<input id="marcaP" placeholder="Marca">
<input id="colorP" placeholder="Color">
<input id="precioP" placeholder="Precio">
<input id="stockP" placeholder="Stock">

<button onclick="guardarProducto()" class="btn-save">Guardar</button>
<button onclick="limpiarProducto()">Limpiar</button>

<table id="tablaProductos"></table>
</div>

<!-- ================= VENTAS ================= -->
<div id="ventas" class="card">
<h2>Ventas (Carrito)</h2>

<select id="clienteV"></select>
<select id="productoV"></select>
<input id="cantidadV" placeholder="Cantidad">

<button onclick="agregarItem()">Agregar</button>
<button onclick="finalizarVenta()" class="btn-save">Finalizar</button>

<table id="tablaVentas"></table>

<h3>Total: $<span id="total">0</span></h3>
</div>

</div>

<script>
const API=window.location.origin;

let editCliente=null;
let editProducto=null;
let carrito=[];

// ================= NAV =================
function mostrar(id){
 document.querySelectorAll(".card").forEach(c=>c.style.display="none");
 document.getElementById(id).style.display="block";
}

// ================= CLIENTES CRUD =================
async function cargarClientes(){
 const res=await fetch(API+"/clientes");
 const data=await res.json();

 tablaClientes.innerHTML=`
 <tr>
  <th>Nombre</th>
  <th>Teléfono</th>
  <th>Dirección</th>
  <th>Acciones</th>
 </tr>`;

 data.forEach(c=>{
  tablaClientes.innerHTML+=`
  <tr onclick='seleccionarCliente(${JSON.stringify(c)})'>
    <td>${c.nombre}</td>
    <td>${c.telefono}</td>
    <td>${c.direccion}</td>
    <td>
      <button onclick='editarCliente(event,${JSON.stringify(c)})'>Editar</button>
      <button onclick='eliminarCliente(event,"${c._id}")'>Eliminar</button>
    </td>
  </tr>`;
 });
}

function seleccionarCliente(c){
 nombreC.value=c.nombre;
 telefonoC.value=c.telefono;
 direccionC.value=c.direccion;
 editCliente=c._id;
}

function editarCliente(e,c){
 e.stopPropagation();
 nombreC.value=c.nombre;
 telefonoC.value=c.telefono;
 direccionC.value=c.direccion;
 editCliente=c._id;
}

async function guardarCliente(){

 const data={
   nombre:nombreC.value,
   telefono:telefonoC.value,
   direccion:direccionC.value
 };

 if(editCliente){
   await fetch(API+"/clientes/"+editCliente,{
     method:"PUT",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify(data)
   });
   editCliente=null;
 }else{
   await fetch(API+"/clientes",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify(data)
   });
 }

 limpiarCliente();
 cargarClientes();
}

async function eliminarCliente(e,id){
 e.stopPropagation();
 await fetch(API+"/clientes/"+id,{method:"DELETE"});
 cargarClientes();
}

function limpiarCliente(){
 nombreC.value="";
 telefonoC.value="";
 direccionC.value="";
 editCliente=null;
}

// ================= PRODUCTOS CRUD =================
async function cargarProductos(){
 const res=await fetch(API+"/productos");
 const data=await res.json();

 tablaProductos.innerHTML=`
 <tr>
  <th>Nombre</th>
  <th>Marca</th>
  <th>Color</th>
  <th>Precio</th>
  <th>Stock</th>
  <th>Acciones</th>
 </tr>`;

 data.forEach(p=>{
  tablaProductos.innerHTML+=`
  <tr onclick='seleccionarProducto(${JSON.stringify(p)})'>
    <td>${p.nombre}</td>
    <td>${p.marca}</td>
    <td>${p.color}</td>
    <td>${p.precio}</td>
    <td>${p.stock}</td>
    <td>
      <button onclick='editarProducto(event,${JSON.stringify(p)})'>Editar</button>
      <button onclick='eliminarProducto(event,"${p._id}")'>Eliminar</button>
    </td>
  </tr>`;
 });
}

function seleccionarProducto(p){
 nombreP.value=p.nombre;
 marcaP.value=p.marca;
 colorP.value=p.color;
 precioP.value=p.precio;
 stockP.value=p.stock;
 editProducto=p._id;
}

function editarProducto(e,p){
 e.stopPropagation();
 nombreP.value=p.nombre;
 marcaP.value=p.marca;
 colorP.value=p.color;
 precioP.value=p.precio;
 stockP.value=p.stock;
 editProducto=p._id;
}

async function guardarProducto(){

 const data={
   nombre:nombreP.value,
   marca:marcaP.value,
   color:colorP.value,
   precio:precioP.value,
   stock:stockP.value
 };

 if(editProducto){
   await fetch(API+"/productos/"+editProducto,{
     method:"PUT",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify(data)
   });
   editProducto=null;
 }else{
   await fetch(API+"/productos",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify(data)
   });
 }

 limpiarProducto();
 cargarProductos();
}

async function eliminarProducto(e,id){
 e.stopPropagation();
 await fetch(API+"/productos/"+id,{method:"DELETE"});
 cargarProductos();
}

function limpiarProducto(){
 nombreP.value="";
 marcaP.value="";
 colorP.value="";
 precioP.value="";
 stockP.value="";
 editProducto=null;
}

// ================= VENTAS =================

// VARIABLES (OBLIGATORIO)
let clientesData = [];
let productosData = [];


// ================= CARGAR COMBOS =================
async function cargarSelects(){

 const c = await fetch(API+"/clientes");
 const p = await fetch(API+"/productos");

 clientesData = await c.json();
 productosData = await p.json();

 clienteV.innerHTML =
 `<option value="">Seleccione cliente</option>` +
 clientesData.map(c =>
   `<option value="${c._id}">${c.nombre}</option>`
 ).join("");

 productoV.innerHTML =
 `<option value="">Seleccione producto</option>` +
 productosData.map(p =>
   `<option value="${p._id}">
      ${p.nombre} - ${p.marca} - ${p.color}
    </option>`
 ).join("");
}

// ================= AGREGAR PRODUCTO =================
function agregarItem(){

 const prod = productosData.find(p => p._id === productoV.value);

 if(!prod){
   alert("Seleccione producto");
   return;
 }

 const cantidad = parseInt(cantidadV.value);

 if(!cantidad || cantidad <= 0){
   alert("Cantidad inválida");
   return;
 }

 const existe = carrito.find(i => i.id === prod._id);

 if(existe){
   existe.cantidad += cantidad;
 } else {
   carrito.push({
   id: prod._id,
   producto: prod.nombre,
   marca: prod.marca,
   color: prod.color,
   precio: prod.precio,
   cantidad: cantidad
});
 }

 renderCarrito();
}

// ================= MOSTRAR CARRITO =================
function renderCarrito(){

 let total = 0;

 tablaVentas.innerHTML = `
 <tr>
  <th>Producto</th>
  <th>Cantidad</th>
  <th>Subtotal</th>
 </tr>`;

 carrito.forEach(i=>{
   const sub = i.precio * i.cantidad;
   total += sub;

   tablaVentas.innerHTML += `
   <tr>
     <td>${i.producto}</td>
     <td>${i.cantidad}</td>
     <td>${sub}</td>
   </tr>`;
 });

document.getElementById("total").innerText = total;
}

// ================= FINALIZAR VENTA =================
async function finalizarVenta(){

 if(carrito.length === 0){
   alert("Carrito vacío");
   return;
 }

 const cliente = clientesData.find(c => c._id === clienteV.value);

 if(!cliente){
   alert("Seleccione cliente");
   return;
 }

 await fetch(API+"/ventas",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     cliente: cliente.nombre,
     productos: carrito,
     total: document.getElementById("total").innerText
   })
 });

 carrito = [];
 renderCarrito();

 alert("Venta guardada");
}

// ================= INICIO =================
mostrar("clientes");
cargarClientes();
cargarProductos();
cargarSelects();
</script>

</body>
</html>
